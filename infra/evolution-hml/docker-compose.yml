# =============================================================================
# Evolution API — Sinery HML (homologação) — Prompt 27
#
# Self-hosted WhatsApp gateway for the HML/staging environment ONLY. In
# production Sinery uses the official Meta WhatsApp Cloud API (see
# docs/evolution-api-hml.md → "Por que Meta em produção?").
#
# This compose file runs Evolution API v2 + PostgreSQL + Redis. NO real secrets
# live here — every value comes from `.env` (copy `.env.example` → `.env` and
# fill it in on the host; never commit the real `.env`).
#
# IMPORTANT: the Evolution API container's env var NAMES vary between versions.
# The names below target Evolution API v2 (atendai/evolution-api). Before you
# deploy, CONFIRM them against the exact image tag you pin — see the "Verify env
# names" note in README.md.
# =============================================================================

services:
  evolution-api:
    # Pin an explicit version in HML (do NOT use :latest in a shared env).
    # Confirm the tag + its env-var names at https://github.com/EvolutionAPI/evolution-api
    image: atendai/evolution-api:${EVOLUTION_IMAGE_TAG:-v2.1.1}
    container_name: sinery-hml-evolution-api
    restart: unless-stopped
    ports:
      # host:container — Evolution listens on 8080 inside the container.
      - "${EVOLUTION_HOST_PORT:-8080}:8080"
    environment:
      # --- Server ---
      SERVER_URL: ${SERVER_URL}
      # --- Auth (global API key used in the `apikey` header) ---
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      # --- Persistence: PostgreSQL ---
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${DATABASE_CONNECTION_URI}
      DATABASE_CONNECTION_CLIENT_NAME: sinery_hml_evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      # --- Cache: Redis ---
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: ${CACHE_REDIS_URI}
      CACHE_REDIS_PREFIX_KEY: sinery_hml
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      # --- Logs ---
      LOG_LEVEL: ${LOG_LEVEL:-ERROR}
      LOG_COLOR: "true"
      # --- Session / device label shown on the phone ---
      CONFIG_SESSION_PHONE_CLIENT: ${CONFIG_SESSION_PHONE_CLIENT:-Sinery HML}
      CONFIG_SESSION_PHONE_NAME: ${CONFIG_SESSION_PHONE_NAME:-Chrome}
      # --- CORS ---
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      # --- Webhook (optional global default; Sinery sets a per-instance webhook
      #     via the API — see tests/requests.http). Leave disabled by default. ---
      WEBHOOK_GLOBAL_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - evolution_instances:/evolution/instances

  postgres:
    image: postgres:16-alpine
    container_name: sinery-hml-evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-evolution}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-evolution}
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evolution}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not published to the host by default — only Evolution needs it. Uncomment
    # to inspect the DB locally.
    # ports:
    #   - "5433:5432"

  redis:
    image: redis:7-alpine
    container_name: sinery-hml-evolution-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - evolution_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  evolution_instances:
  evolution_postgres:
  evolution_redis:

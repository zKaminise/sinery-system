services:
  postgres:
    image: postgres:16-alpine
    container_name: sinery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sinery
      POSTGRES_PASSWORD: sinery
      POSTGRES_DB: sinery_system
    ports:
      # Host port is 5544 (not 5432) to avoid clashing with a native Windows
      # PostgreSQL install that already listens on 5432. Container stays on 5432.
      # DATABASE_URL in .env must use localhost:5544 to match.
      - "5544:5432"
    volumes:
      - sinery_postgres_data:/var/lib/postgresql/data

volumes:
  sinery_postgres_data:
